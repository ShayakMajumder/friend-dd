<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Friendo</title>
  <style>
    body {
      background-color: pink;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      color: red;
      margin-top: 15%;
      font-size: 3em;
    }
    .buttons {
      margin-top: 40px;
    }
    button {
      padding: 15px 30px;
      margin: 10px;
      font-size: 1.2em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .yes {
      background-color: red;
      color: white;
    }
    .no {
      background-color: white;
      color: red;
    }
    .no:hover {
      transform: translate(
        calc(50px - 100px * Math.random()),
        calc(50px - 100px * Math.random())
      );
    }
  </style>
</head>
<body>
  <h1>Junpai - will you be my forever chotki-motki partner? 💖</h1>
  <div class="buttons">
    <button class="yes" onclick="window.location.href='yes.html'">Yes</button>
    <button class="no" id="noBtn">No</button>
  </div>

  <!-- Background Music -->
  <audio autoplay loop>
    <source src="bittersweet_symphony.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  <!-- Moving cute character -->
  <div class="character">🧸</div>
  
  <!-- Falling hearts container -->
  <div id="hearts-container"></div>

  <script src="script.js"></script>
</body>
</html>
