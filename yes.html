<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Knew you would say yes!</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .heart {
      font-size: 5em;
      color: crimson;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <h1>Yay! 🎉 Knew you would say yes! 💕</h1>
  <div class="heart">❤️</div>

  <!-- Background Music -->
  <audio autoplay loop>
    <source src="bittersweet_symphony.mp3" type="audio/mpeg">
  </audio>
</body>
</html>
