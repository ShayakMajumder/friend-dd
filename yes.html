<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Knew you would say yes!</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .heart {
      font-size: 5em;
      color: crimson;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    /* GIF styling */
    .gif-container1 {
      margin-top: 30px;
      text-align: center;
    }
    .gif-container1 img {
      width: 250px; /* adjust size */
      height: auto;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    /* Teddy couple animation */
    .teddy-couple {
      position: absolute;
      bottom: 50px;
      left: -200px;
      font-size: 3em;
      animation: walkAcross 12s linear infinite;
    }
    @keyframes walkAcross {
      from { left: -200px; }
      to { left: 100vw; }
    }
  </style>
</head>
<body>
  <h1>Yay! 🎉 Knew you would say yes!  Yayyyyyyyyy 💕</h1>
  <div class="heart">❤️</div>

  <!-- Teddy couple -->
  <div class="teddy-couple">🧸🧸</div>
  
  <!-- Cute GIF -->
  <div class="gif-container1">
    <img src="dudu.gif" alt="Cute Teddy GIF">
  </div>

  <!-- Background Music -->
  <audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>
</body>
</html>
